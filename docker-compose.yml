x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    # ⚙️ CONFIG: Mount C-drive config to container root
    - C:/Users/13988/.nanobot:/root/.nanobot
    # 🧠 RUNTIME: Mount core source to /app for execution
    - F:/Projects/yui/yui-core:/app
    # 📂 PROJECT: Mount the whole 'yui' folder into the workspace for management
    - F:/Projects/yui:/root/.nanobot/workspace/projects/yui

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: >
      sh -c "uv pip install --system -e . && nanobot gateway"
    restart: always
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
