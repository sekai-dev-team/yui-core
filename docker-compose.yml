x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./.nanobot:/root/.nanobot
    - .:/app  # 🚀 SOURCE MOUNT: Sync host code with container runtime

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    # 🧬 EVOLUTION ENTRYPOINT: Install local deps in editable mode then start gateway
    command: >
      sh -c "uv pip install --system -e . && nanobot gateway"
    restart: always
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
