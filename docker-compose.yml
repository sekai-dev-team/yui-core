x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  user: root  # 🔓 EVOLUTION PRIVILEGE: Allow process signal handling
  volumes:
    # ⚙️ CONFIG: Mount C-drive config to container root
    - C:/Users/13988/.nanobot:/root/.nanobot
    # 🧠 RUNTIME: Mount core source to /app for execution
    - F:/Projects/yui/yui-core:/app
    # 📂 PROJECT: Mount the whole 'yui' folder into the workspace for management
    - F:/Projects/yui:/root/.nanobot/workspace/projects/yui

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    # 🛡️ INIT PROCESS: Use tini to handle signals gracefully
    init: true
    # 🧠 RUNTIME BASE: Point working directory to the integrated source path
    working_dir: /app
    # 🚪 OVERRIDE ENTRYPOINT: Allow shell execution
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "uv pip install --system -e . && nanobot gateway"
    restart: always
    ports:
      - 18790:18790
    environment:
      # 🌐 PROXY: Use host's Clash (assumed port 7890)
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - NO_PROXY=localhost,127.0.0.1,aliyuncs.com,zhipuai.com,deepseek.com,moonshot.cn,baichuan-ai.com,volces.com,.cn
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
